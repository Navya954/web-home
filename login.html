<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Login Signup Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="main-container" id="container">

    <div class="image-side">
        <div class="image-text">
            NSUT<br>
            Green Campus, Bright Future
        </div>
    </div>

    <div class="form-side">

        <!-- SIGNUP -->
        <div class="form-box" id="signupForm">
            <h1>Create account</h1>
            <p>Already have an account? <span class="switch" onclick="goLogin()">Log in</span></p>

            <div class="input-grid">
                <input type="text" placeholder="First name">
                <input type="text" placeholder="Last name">
                <input class="full" type="email" placeholder="Email">
                <input class="full" type="password" placeholder="Password">
            </div>

            <button class="btn">Create account</button>

            <div class="divider">
                <span></span> Or register with <span></span>
            </div>

            <div class="social">
                <button><i class="fab fa-google"></i> Google</button>
                <button><i class="fab fa-apple"></i> Apple</button>
            </div>
        </div>

        <!-- LOGIN -->
        <div class="form-box" id="loginForm" style="display:none;">
            <h1>Log in</h1>
            <p>Don’t have an account? <span class="switch" onclick="goSignup()">Create account</span></p>

            <div class="input-grid">
                <input class="full" type="email" placeholder="Email">
                <input class="full" type="password" placeholder="Password">
            </div>

            <button class="btn">Log in</button>

            <div class="divider">
                <span></span> Or login with <span></span>
            </div>

            <div class="social">
                <button><i class="fab fa-google"></i> Google</button>
                <button><i class="fab fa-apple"></i> Apple</button>
            </div>
        </div>

    </div>
</div>

<script src="login.js"></script>
</body>
</html>
